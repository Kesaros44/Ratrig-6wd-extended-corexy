######################################################################
# skew_correction
######################################################################

# Skew correction profile
[skew_correction]

[gcode_macro _SKEW_PROFILE]
gcode:
    SET_SKEW XY=141.39,141.47,99.83
    RESPOND MSG="Skew correction loaded: AC=141.39, BD=141.47, AD=99.83"

# Skew correction 해제
[gcode_macro CLEAR_SKEW_PROFILE] 
gcode:
    SET_SKEW CLEAR=1
    RESPOND MSG="Skew correction cleared"


######################################################################
# 매크로 설정
######################################################################

[gcode_macro PRINT_START]
gcode:
   {% set target_bed = params.BED|default(40)|int %}
   {% set target_extruder = params.EXTRUDER|default(150)|int %}
   #{% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
   #{% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    # STATUS_HOMING
   SET_GCODE_OFFSET Z=0    # ⚠️ Z-OFFSET을 0으로 리셋!
   G28                      # 전체 홈잉 (X, Y, Z)
   G90                      # 절대 좌표 모드로 전환

   BED_MESH_CLEAR

  # Check if the bed temp is higher than 90c - if so then trigger a heatsoak.
  {% if params.BED|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    M106 S255                                           # Turn on the PT-fan

    ##  Uncomment if you have a Nevermore.
    #SET_PIN PIN=nevermore VALUE=1                      # Turn on the nevermore

    G1 X250 Y210 Z15 F9000                    # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"  # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}   # Waits for chamber temp

  # If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp with a 5 min soak
  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    G1 X250 Y210 Z15 F9000                    # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
   # SET_DISPLAY_TEXT MSG="Soak for 3 min"               # Display info on display
   # G4 P120000                                          # Wait 5 min for the bedtemp to stabilize
  {% endif %}

  # Heat hotend to 150c. This helps with getting a correct Z-home.
    SET_DISPLAY_TEXT MSG="Hotend: 150c"                   # Display info on display
    M109 S150                                             # Heat hotend to 150c

  #  Uncomment for Trident (Z_TILT_ADJUST)
    SET_DISPLAY_TEXT MSG="Leveling"                      # Display info on display
    Z_TILT_ADJUST                                        # Level the printer via Z_TILT_ADJUST
    G28 Z                                                # Home Z again after Z_TILT_ADJUST

  # Uncomment for bed mesh (2 of 2 for bed mesh)
    SET_DISPLAY_TEXT MSG="Bed mesh"                      # Display info on display
    BED_MESH_CALIBRATE                                   # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh

    CARTOGRAPHER_TOUCH                                    # Calibrate z offset only with hot nozzle

  # Heat up the hotend up to target via data from slicer
    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"     # Display info on display
    G1 X250 Y210 Z15 F9000                      # Go to center of the bed
    M107                                                  # Turn off partcooling fan
    M109 S{target_extruder}     

  # Get ready to print by doing a primeline and updating the LEDs
    SET_DISPLAY_TEXT MSG="Printer goes brr"               # Display info on display
    G90                              # 절대 좌표 모드
    G0 X30 Y5 Z0.3 F5000.0         # X30, Y5, Z0.3으로 이동    
    G91                            # 상대좌표 
    G1 X120 E20 F1500              # 첫 번째 선
    G1 Y2 F5000                    # 옆으로 이동
    G1 X-120 E30 F1500             # 두 번째 선 (반대 방향)
    G90                            # 절대좌표
    G92 E0                          # E값 리셋 (필수!)
    G1 Z3.0 F3000                   # Z 올림

    # 스큐 프로필 로드 (올바른 매크로 사용)
    _SKEW_PROFILE

    # 팬 작동
    SET_FAN_SPEED FAN=motor_cooling_pump SPEED=1.0 
    SET_FAN_SPEED FAN=motor_cooling_fan SPEED=1.0
    SET_FAN_SPEED FAN=Nevermore SPEED=0.7



[gcode_macro PRINT_END]
gcode:
    # 현재 Z 위치 저장
    {% set max_z = printer.toolhead.position.z %}
    # Turn off bed, extruder, and fan
    STATUS_READY
    M140 S0
    M104 S0
    M106 S0
    M107 
    
    # 상대좌표로 전환하여 Z축 2mm 올리고 필라멘트 후진
    G91
    G1 Z2 E-20 F2400
    
    # 절대좌표로 전환
    G90
    
    # 최종 출력물 높이 + 30mm 위치로 노즐 이동 (X10, Y300)
    G1 X10 Y400 Z{max_z + 30} F3000
    

    # Skew Correction 초기화
    SET_SKEW CLEAR=1
    RESPOND MSG="Skew correction cleared"

    #SET_FLAP_ENABLED ENABLED=0
    SET_FAN_SPEED FAN=motor_cooling_pump SPEED=0 
    SET_FAN_SPEED FAN=motor_cooling_fan SPEED=0 # 모터 쿨링팬 끄기
    SET_FAN_SPEED FAN=Nevermore SPEED=0 # 네버모어마이크로팬 종료



[neopixel hotend_led]
pin: ebb36:PD3              # 네오픽셀 데이터 핀
chain_count: 8       # LED 개수
color_order: GRB      # 칩셋 색 순서
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0

[gcode_macro STARTUP_LED]
gcode:
    SET_LED LED=hotend_led RED=1.0 GREEN=1.0 BLUE=1.0   ; 백색

[delayed_gcode led_on_start]
initial_duration: 1.0
gcode:
    STARTUP_LED

