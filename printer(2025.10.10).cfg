[include mainsail.cfg]
[include Macro.cfg]
[include Speed.cfg]
[include config.cfg]
#[include Flap_stepper.cfg]


[mcu rpi]
serial: /tmp/klipper_host_mcu

[mcu ebb36]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_350042001150425539393020-if00

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_180042000F51313531383332-if00

#[mcu D5]
#canbus_uuid: 6b795007c648
#canbus_uuid: b82b8965e2e5


[printer]
kinematics: extended_corexy
max_velocity: 900
max_accel: 40000
max_z_velocity: 15
max_z_accel: 100
square_corner_velocity: 5.0
home_y_axis_with_b_rail : False



##################################
# CoreXY 모터 (1~4)
##################################

[stepper_a]
step_pin: PC13
dir_pin: !PC14
enable_pin: !PE6
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 
endstop_pin: !ebb36:PB6
position_endstop: 0
position_max: 500
homing_speed: 50
homing_retract_dist: 10

[tmc5160 stepper_a]
cs_pin: PG14
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
sense_resistor: 0.075
interpolate: True
run_current: 1.5
hold_current: 0.8
stealthchop_threshold: 0 
#diag1_pin: PF0 # use the same pin that was previously the endstop_pin!
#driver_TBL: 1
#driver_TOFF: 2
#driver_HSTRT: 4
#driver_FD3: 0
#driver_HEND: 3
#driver_CHM: 1`

[stepper_a1]
step_pin: PE4
dir_pin: PE5
enable_pin: !PE3
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 

[tmc5160 stepper_a1]
cs_pin: PG13
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
sense_resistor: 0.075
interpolate: True
run_current: 1.5
hold_current: 0.8
stealthchop_threshold: 0


[stepper_b]
step_pin: PE1
dir_pin: !PE0
enable_pin: !PE2
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 
endstop_pin: !PF4
position_endstop: 435
position_min: 0
position_max: 435
homing_speed: 100
homing_retract_dist: 10.0

[tmc5160 stepper_b]
cs_pin: PG12
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13#
sense_resistor: 0.075
interpolate: True
run_current: 1.5
hold_current: 0.8
stealthchop_threshold: 0

[stepper_b1]
step_pin: PB8
dir_pin: PB9
enable_pin: !PB7
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 

[tmc5160 stepper_b1]
cs_pin: PG11
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
sense_resistor: 0.075
interpolate: True
run_current: 1.5
hold_current: 0.8
stealthchop_threshold: 0 



##################################
# Y축 보조 모터 (5,6번)
# - CoreXY에서 Y축 움직일 때만 동작
##################################

[stepper_c]
step_pin: PB5
dir_pin: !PB4
enable_pin: !PB6
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 
endstop_pin: !PF0
position_endstop: 435
position_min: 0
position_max: 435
homing_speed: 100
homing_retract_dist: 10.0

[tmc5160 stepper_c]
cs_pin: PG10
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
sense_resistor: 0.075
interpolate: True
run_current: 1.5
hold_current: 0.8
stealthchop_threshold: 0 


[stepper_c1]
step_pin: PG15
dir_pin: PB3
enable_pin: !PD5
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 

[tmc5160 stepper_c1]
cs_pin: PG9
spi_software_sclk_pin: PE12
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
sense_resistor: 0.075
interpolate: True
run_current: 1.5
hold_current: 0.8
stealthchop_threshold: 0 


##################################
# Z 모터 (1~3)
##################################

[stepper_z]
step_pin: PG6
dir_pin: !PC6
enable_pin: !PC8
endstop_pin: probe:z_virtual_endstop
microsteps: 16
rotation_distance: 1.3333
full_steps_per_rotation: 200
position_max: 430
position_min: 0
homing_speed: 10
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PG7
run_current: 0.650
interpolate: True
stealthchop_threshold: 0


[stepper_z1]
step_pin: PA10
dir_pin: !PA9
enable_pin: !PA15
microsteps: 16
rotation_distance: 1.3333
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: PD6
run_current: 0.650
interpolate: True
stealthchop_threshold: 0


[stepper_z2]
step_pin: PA8
dir_pin: !PC7
enable_pin: !PC9
microsteps: 16
rotation_distance: 1.3333
full_steps_per_rotation: 200

[tmc2209 stepper_z2]
uart_pin: PG8
run_current: 0.650
interpolate: True
stealthchop_threshold: 0


##################################
# 익스트루더
##################################

[extruder]
step_pin: ebb36:PD0
dir_pin: !ebb36:PD1
enable_pin: !ebb36:PD2
microsteps: 16
rotation_distance: 5.8
nozzle_diameter: 0.50
filament_diameter: 1.750
heater_pin: PF6 
sensor_type: MAX31865   
sensor_pin: ebb36:PA4   
spi_bus: spi1   
rtd_nominal_r: 100    
rtd_reference_r: 430   
rtd_num_of_wires: 2  
#samples: 10
#sample_time: 0.1
#smooth_time: 1
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 350
min_extrude_temp: 160 
smooth_time: 10
pressure_advance: 0.028
pressure_advance_smooth_time: 0.005  # 기본값은 0.03
max_extrude_only_distance: 250  # 기본값은 50mm입니다. 100mm로 조정해보세요.

[tmc2209 extruder]
uart_pin: ebb36:PA15
run_current: 0.7
interpolate: False
stealthchop_threshold: 0


######################################################################
# 보드핀 설정
######################################################################

[board_pins]
aliases:
    # FPC header, Aliases EXP1 & EXP2 for mini12864
    EXP1_1=PG2, EXP1_2=PD15,
    EXP1_3=PD14, EXP1_4=PD13,
    EXP1_5=PD12, EXP1_6=PD11,
    EXP1_7=PD10, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PG5, EXP2_4=PE11,
    EXP2_5=PG4, EXP2_6=PE14,
    EXP2_7=PG3, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>



[display]
lcd_type: uc1701
cs_pin: EXP1_3
a0_pin: EXP1_4
rst_pin: EXP1_5
contrast: 63
encoder_pins: ^EXP2_5, ^EXP2_3
click_pin: ^!EXP1_2


spi_software_sclk_pin: PE12
spi_software_miso_pin: PE13
spi_software_mosi_pin: PE14


[virtual_sdcard]
path: /home/pi/printer_data/gcodes

